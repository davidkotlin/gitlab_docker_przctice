# compose v2 不再需要 version: 欄位

services:
  # ==========================================
  # [1] 唯一的 Nginx：你手搓的，直接打 omnibus 裡的 Workhorse
  # ==========================================
  gitlab-nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      gitlab-app:
        condition: service_healthy
    networks:
      - gitlab_network
    restart: unless-stopped

  # ==========================================
  # [2] 應用層：omnibus（關掉內建 nginx，Workhorse 改聽 TCP 8181）
  # ==========================================
  gitlab-app:
    image: gitlab/gitlab-ce:17.11.0-ce.0   # ★ 改成你要的當前版本，務必釘版本
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # ★ 改成你瀏覽器實際輸入的網址（例如 http://192.168.x.x）
        external_url 'http://localhost'

        # --- 關閉內建 PostgreSQL，改連你手搓的 postgres 容器 ---
        postgresql['enable'] = false
        gitlab_rails['db_adapter']  = 'postgresql'
        gitlab_rails['db_host']     = 'gitlab-postgres'
        gitlab_rails['db_port']     = 5432
        gitlab_rails['db_username'] = 'gitlab'
        gitlab_rails['db_password'] = 'gitlab_db_secret'
        gitlab_rails['db_database'] = 'gitlabhq_production'

        # --- 關閉內建 Redis，改連你手搓的 redis 容器 ---
        redis['enable'] = false
        gitlab_rails['redis_host']     = 'gitlab-redis'
        gitlab_rails['redis_port']     = 6379
        gitlab_rails['redis_password'] = 'gitlab_redis_secret'

        # --- 關掉內建 Nginx，讓 Workhorse 改聽 TCP，給外部的你那顆 nginx 連 ---
        nginx['enable'] = false
        gitlab_workhorse['listen_network'] = "tcp"
        gitlab_workhorse['listen_addr']    = "0.0.0.0:8181"

        # --- 8GB 機器的記憶體瘦身 ---
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 9
        prometheus_monitoring['enable'] = false
    volumes:
      - ./data/app/config:/etc/gitlab
      - ./data/app/logs:/var/log/gitlab
      - ./data/app/data:/var/opt/gitlab
    shm_size: '256m'
    depends_on:
      gitlab-postgres:
        condition: service_healthy
      gitlab-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "gitlab-ctl status >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 600s
    networks:
      - gitlab_network
    restart: unless-stopped

  # ==========================================
  # [3] 你手搓的 PostgreSQL（named volume）
  # ==========================================
  gitlab-postgres:
    build: ./postgres
    volumes:
      - pg_data:/var/lib/postgresql/14/main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitlab -d gitlabhq_production"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gitlab_network
    restart: unless-stopped

  # ==========================================
  # [4] 你手搓的 Redis
  # ==========================================
  gitlab-redis:
    build: ./redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a gitlab_redis_secret ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gitlab_network
    restart: unless-stopped

networks:
  gitlab_network:
    driver: bridge

volumes:
  pg_data:
